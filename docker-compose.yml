services:
   db:
      image: postgres:17-alpine
      restart: unless-stopped
      network_mode: host
      environment:
         POSTGRES_USER: ${POSTGRES_USER}
         POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
         POSTGRES_DB: ${POSTGRES_DB}
         PGPORT: ${POSTGRES_PORT}
      volumes:
         - postgres_data:/var/lib/postgresql/data

volumes:
   postgres_data:
